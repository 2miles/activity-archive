name: activity-archive

services:
  activity-archive:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: activity-archive
    ports:
      - "8765:8765"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/api/health', timeout=5)"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - ./archive:/app/archive
      - ./derived:/app/derived
      - ./.env:/app/.env:ro
      - ./token.json:/app/token.json
